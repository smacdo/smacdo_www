{% extends "base.html" %}

{% block title %}{{ page.title }} — smacdo.com{% endblock title %}

{% block content %}
<h1>{{ page.title }}</h1>
{% if page.description %}
<p class="game-description">{{ page.description }}</p>
{% endif %}

<div id="game-container">
    <canvas id="game-canvas"></canvas>
</div>

{{ page.content | safe }}
{% endblock content %}
