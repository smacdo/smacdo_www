{% extends "base.html" %}

{% block title %}{{ page.title }} — smacdo.com{% endblock title %}

{% block content %}
<a href="/games/" class="back-link">← Games</a>
<h1>{{ page.title }}</h1>
{% if page.description %}
<p class="game-description">{{ page.description }}</p>
{% endif %}

<div id="game-container">
    <canvas id="game-canvas"></canvas>
</div>

{{ page.content | safe }}

{% if page.extra.loader == "ts" %}
<script src="/js/demos/{{ page.slug }}.js" defer></script>
{% endif %}
{% endblock content %}
