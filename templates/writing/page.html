{% extends "base.html" %}

{% block title %}{{ page.title }} — smacdo.com{% endblock title %}

{% block content %}
<article>
    <header class="article-header">
        <h1>{{ page.title }}</h1>
        {% if page.date %}
        <time datetime="{{ page.date | date(format='%Y-%m-%d') }}">
            {{ page.date | date(format="%B %d, %Y") }}
        </time>
        {% endif %}
    </header>

    {{ page.content | safe }}
</article>
{% endblock content %}
