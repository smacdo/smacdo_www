name: Reusable Deploy Workflow
on:
  workflow_call:
    inputs:
      deployment_name:
        required: true
        type: string
      environment:
        required: true
        type: string
    secrets:
      DEPLOY_DIR:
        required: true
      SSH_HOST:
        required: true
      SSH_KEY:
        required: true
      SSH_USER:
        required: true
      SSH_SERVER_KEY:
        required: true

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          wget -qO- https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Build project
        run: make build

      - name: Check internal links
        run: zola check

      - name: Upload build artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: deployment-files
          path: ./public

  deploy:
    name: Deploy to ${{ inputs.deployment_name }}
    environment: ${{ inputs.environment }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Generate SSH keys
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.SSH_SERVER_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<END
          Host remote-host
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking yes
          END
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
      - name: Get deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-files
          path: ./public
      - name: Deploy
        run: |
          rsync --recursive --archive --compress --delay-updates --delete-after --itemize-changes \
             ./public/ ${{ secrets.SSH_USER }}@remote-host:/${{ secrets.DEPLOY_DIR }}/
